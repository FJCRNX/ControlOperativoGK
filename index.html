/* ---------- Audio: desbloqueo requerido por iOS Safari en el primer toque ---------- */
let audioCtx = null;
function desbloquearAudio(){
  if (!audioCtx){
    try{ audioCtx = new (window.AudioContext||window.webkitAudioContext)(); }catch(e){ return; }
  }
  if (audioCtx.state === 'suspended') audioCtx.resume();
}
document.addEventListener('touchstart', desbloquearAudio, { once:true, passive:true });
document.addEventListener('click', desbloquearAudio, { once:true });

/* ---------- Pitido + confirmación de duplicado ---------- */
function beep(){
  try{
    desbloquearAudio();
    if (!audioCtx) return;
    const o = audioCtx.createOscillator(), g = audioCtx.createGain();
    o.type = 'square'; o.frequency.value = 880;
    o.connect(g); g.connect(audioCtx.destination);
    g.gain.setValueAtTime(0.25, audioCtx.currentTime);
    o.start(); o.stop(audioCtx.currentTime + 0.18);
  }catch(e){}
}
async function buscarPrevio(ticket, traspaso){
  const { data } = await sb.from('registros').select('status, created_at')
    .eq('ticket', ticket).eq('traspaso', traspaso)
    .order('created_at', { ascending:false }).limit(1);
  return data && data.length ? data[0] : null;
}
function confirmarDuplicado(prev){
  return new Promise(resolve=>{
    beep();
    const esParcial = prev.status === 'Parcial';
    const overlay = document.createElement('div');
    overlay.className = 'fixed inset-0 bg-black/40 flex items-center justify-center z-[60] p-4';
    overlay.innerHTML = `
      <div class="bg-white rounded-2xl p-5 max-w-sm w-full fade-in">
        <h2 class="font-semibold text-base mb-2 ${esParcial?'text-amber-600':'text-red-600'}">
          ${esParcial ? '⚠ Entrega anterior en parcialidades' : '⚠ Posible registro duplicado'}</h2>
        <p class="text-sm text-gray-600 mb-4">
          ${esParcial
            ? 'Este Ticket/Traspaso ya tiene una entrega previa registrada como Parcial. Verifica antes de continuar.'
            : 'Este Ticket y Traspaso ya fueron registrados antes. Si continúas, serás responsable de un posible error de entrega duplicada.'}</p>
        <div class="flex gap-2">
          <button id="dupCancel" class="flex-1 border border-gray-200 rounded-lg py-2 text-sm">Cancelar</button>
          <button id="dupOk" class="flex-1 text-white rounded-lg py-2 text-sm ${esParcial?'bg-amber-600 hover:bg-amber-700':'bg-red-600 hover:bg-red-700'}">Sí, continuar</button>
        </div>
      </div>`;
    document.body.appendChild(overlay);
    overlay.querySelector('#dupCancel').onclick = ()=>{ overlay.remove(); resolve(false); };
    overlay.querySelector('#dupOk').onclick = ()=>{ overlay.remove(); resolve(true); };
  });
}
// Filtra un input para aceptar solo dígitos (Picking / Traspaso)
function soloNumeros(id){
  const el = document.getElementById(id);
  el.setAttribute('inputmode','numeric');
  el.setAttribute('pattern','[0-9]*');
  el.addEventListener('input', ()=>{
    const limpio = el.value.replace(/[^0-9]/g,'');
    if (limpio !== el.value) el.value = limpio;
  });
}

// Botón de cámara junto a un input: abre el lector y rellena el campo sin enviar el formulario
let escanerActivo = null;
function abrirEscaner(targetInputId){
  const overlay = document.createElement('div');
  overlay.className = 'fixed inset-0 bg-black/70 flex items-center justify-center z-[70] p-4';
  overlay.innerHTML = `
    <div class="bg-white rounded-2xl p-4 w-full max-w-sm fade-in">
      <div class="flex items-center justify-between mb-2">
        <h2 class="font-semibold text-sm">Escanear código</h2>
        <button id="cerrarEscaner" class="text-gray-400 text-sm">✕ Cerrar</button>
      </div>
      <div id="qr-reader" class="rounded-lg overflow-hidden"></div>
      <p class="text-xs text-gray-400 mt-2">Apunta la cámara al código QR o de barras.</p>
    </div>`;
  document.body.appendChild(overlay);

  const cerrar = async ()=>{
    try{ if (escanerActivo){ await escanerActivo.stop(); escanerActivo.clear(); } }catch(e){}
    escanerActivo = null;
    overlay.remove();
  };
  overlay.querySelector('#cerrarEscaner').onclick = cerrar;

  escanerActivo = new Html5Qrcode('qr-reader');
  escanerActivo.start(
    { facingMode: 'environment' },
    { fps: 12, qrbox: 220 },
    (texto)=>{
      const soloDigitos = texto.replace(/[^0-9]/g,'');
      const input = document.getElementById(targetInputId);
      input.value = soloDigitos;
      input.dispatchEvent(new Event('input', { bubbles:true })); // dispara exclusividad/validaciones sin enviar el form
      beep();
      cerrar();
    },
    ()=>{ /* sigue intentando, ignorar frames sin código */ }
  ).catch(()=>{
    overlay.querySelector('#qr-reader').innerHTML = `<p class="text-sm text-red-600 p-3">No se pudo abrir la cámara. Revisa los permisos del navegador.</p>`;
  });
}
function botonEscaner(targetInputId){
  return `<button type="button" data-scan="${targetInputId}" class="px-3 border border-gray-200 rounded-lg text-gray-500 hover:bg-gray-50" title="Escanear código">
    <svg class="w-5 h-5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <path d="M3 7V5a2 2 0 0 1 2-2h2M17 3h2a2 2 0 0 1 2 2v2M21 17v2a2 2 0 0 1-2 2h-2M7 21H5a2 2 0 0 1-2-2v-2M7 12h10"/>
    </svg></button>`;
}
function exclusividad(idA, idB){
  const a = document.getElementById(idA), b = document.getElementById(idB);
  const sync = ()=>{
    b.disabled = a.value.trim().length > 0;
    a.disabled = b.value.trim().length > 0;
  };
  a.addEventListener('input', sync); b.addEventListener('input', sync);
}

/* ---------- Helpers UI ---------- */
function toast(msg, ok=true){
  const t = document.createElement('div');
  t.className = `fixed bottom-4 right-4 z-50 px-4 py-2 rounded-lg shadow-sm text-sm text-white fade-in ${ok?'bg-emerald-600':'bg-red-600'}`;
  t.textContent = msg;
  document.body.appendChild(t);
  setTimeout(()=>t.remove(), 2600);
}

  const paths = {

    list:'M8 6h13M8 12h13M8 18h13M3 6h.01M3 12h.01M3 18h.01',
    users:'M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2M9 11a4 4 0 1 0 0-8 4 4 0 0 0 0 8ZM23 21v-2a4 4 0 0 0-3-3.87M16 3.13a4 4 0 0 1 0 7.75',
    logout:'M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4M16 17l5-5-5-5M21 12H9',
    chart:'M3 3v18h18M18 17V9M13 17V5M8 17v-3',
    gear:'M12 15a3 3 0 1 0 0-6 3 3 0 0 0 0 6ZM19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 1 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.6 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 1 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06A2 2 0 1 1 7.04 4.3l.06.06A1.65 1.65 0 0 0 9 4.6a1.65 1.65 0 0 0 1-1.51V3a2 2 0 1 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9c.13.61.49 1.14 1 1.51H21a2 2 0 1 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1Z',
  };
  return `<svg class="${cls}" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="${paths[name]||''}"/></svg>`;
}

/* ============================================================
   LOGIN
============================================================ */
function renderLogin(){
  app.innerHTML = `
  <main class="min-h-screen flex items-center justify-center p-4">
    <section class="w-full max-w-sm bg-white border border-gray-200 rounded-2xl p-6 fade-in">
      <div class="text-center mb-6">
        <div class="w-12 h-12 mx-auto rounded-xl bg-indigo-600 text-white flex items-center justify-center font-bold text-lg">CK</div>
        <h1 class="mt-3 font-semibold text-lg">Control Operativo Kuroda</h1>
        <p class="text-sm text-gray-500">Inicia sesión para continuar</p>
      </div>
      <form id="loginForm" class="space-y-3">
        <div>
          <label class="text-sm text-gray-600">Usuario</label>
          <input type="text" id="loginUser" required autocomplete="username" class="w-full mt-1 px-3 py-2 border border-gray-200 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500">
        </div>
        <div>
          <label class="text-sm text-gray-600">Contraseña</label>
          <input type="password" id="loginPass" required autocomplete="current-password" class="w-full mt-1 px-3 py-2 border border-gray-200 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500">
        </div>
        <button type="submit" class="w-full bg-indigo-600 text-white rounded-lg py-2 text-sm font-medium hover:bg-indigo-700 transition">Entrar</button>
        <p id="loginErr" class="text-sm text-red-600 hidden"></p>
      </form>
    </section>
  </main>`;

  document.getElementById('loginForm').addEventListener('submit', async (e)=>{
    e.preventDefault();
    const username = document.getElementById('loginUser').value.trim();
    const password = document.getElementById('loginPass').value;
    const errEl = document.getElementById('loginErr');
    errEl.classList.add('hidden');

    const { data: email, error: errEmail } = await sb.rpc('fn_email_por_usuario', { p_username: username });
    if (errEmail || !email){ errEl.textContent = 'Usuario o contraseña incorrectos.'; errEl.classList.remove('hidden'); return; }

    const { data, error } = await sb.auth.signInWithPassword({ email, password });
    if (error){ errEl.textContent = 'Usuario o contraseña incorrectos.'; errEl.classList.remove('hidden'); return; }
    session = data.session;
    await cargarPerfil();
    if (!perfil){ errEl.textContent = 'Tu usuario no tiene perfil asignado. Contacta al Admin.'; errEl.classList.remove('hidden'); return; }
    renderShell();
  });
}

async function cargarPerfil(){
  const uid = session.user.id;
  const { data: u } = await sb.from('usuarios')
    .select('id, nombre_completo, username, rol_id, sucursal_id, roles(nombre), sucursales(nombre)')
    .eq('id', uid).single();
  if (!u){ perfil = null; return; }
  perfil = {
    id: u.id,
    nombre_completo: u.nombre_completo,
    username: u.username,
    rol: u.roles?.nombre || 'Registro',
    sucursal_id: u.sucursal_id,
    sucursal_nombre: u.sucursales?.nombre || '—'
  };
  const { data: s } = await sb.from('sucursales').select('id,nombre').eq('activo', true);
  sucursales = s || [];
}

async function logout(){
  await sb.auth.signOut();
  session = null; perfil = null;
  renderLogin();
}

/* ============================================================
   SHELL — decide mobile (registro) vs desktop (dashboard)
============================================================ */
function renderShell(){
  if (isMobile() && perfil.rol === 'Registro'){
    renderMobileEntry();
  } else {
    renderDesktopDashboard(perfil.rol === 'Auditor' ? 'auditoria' : 'inicio');
  }
}
window.addEventListener('resize', ()=>{ if (perfil) renderShell(); });

/* ============================================================
   MOBILE — Formulario de captura (4 campos) + geolocalización
============================================================ */
function renderMobileEntry(){
  app.innerHTML = `
  <main class="min-h-screen bg-gray-50">
    <header class="bg-white border-b border-gray-200 px-4 py-3 flex items-center justify-between sticky top-0 z-10" style="padding-top: max(0.75rem, env(safe-area-inset-top))">
      <div>
        <p class="font-semibold text-sm">${perfil.nombre_completo}</p>
        <p class="text-xs text-gray-500">${perfil.sucursal_nombre} · ${perfil.rol}</p>
      </div>
      <button id="btnLogout" class="text-gray-400">${icon('logout','w-5 h-5')}</button>
    </header>

    <section class="p-4 max-w-md mx-auto fade-in">
      <h1 class="font-semibold text-base mb-1">Nuevo registro</h1>
      <p class="text-sm text-gray-500 mb-4">Captura ticket y traspaso de la sucursal.</p>

      <form id="entryForm" class="space-y-4 bg-white border border-gray-200 rounded-2xl p-4">
        <div>
          <label class="text-sm text-gray-600">Picking</label>
          <div class="flex gap-2 mt-1">
            <input id="fTicket" required class="flex-1 px-3 py-2.5 border border-gray-200 rounded-lg text-sm focus:ring-2 focus:ring-indigo-500 focus:outline-none disabled:bg-gray-100 disabled:text-gray-400">
            ${botonEscaner('fTicket')}
          </div>
        </div>
        <div>
          <label class="text-sm text-gray-600">Traspaso</label>
          <div class="flex gap-2 mt-1">
            <input id="fTraspaso" required class="flex-1 px-3 py-2.5 border border-gray-200 rounded-lg text-sm focus:ring-2 focus:ring-indigo-500 focus:outline-none disabled:bg-gray-100 disabled:text-gray-400">
            ${botonEscaner('fTraspaso')}
          </div>
        </div>
        <div>
          <label class="text-sm text-gray-600">Status</label>
          <div class="flex gap-2 mt-1">
            <label class="flex-1"><input type="radio" name="status" value="Total" class="hidden peer" checked>
              <span class="block text-center py-2.5 rounded-lg border border-gray-200 text-sm peer-checked:bg-indigo-600 peer-checked:text-white peer-checked:border-indigo-600 cursor-pointer">Total</span></label>
            <label class="flex-1"><input type="radio" name="status" value="Parcial" class="hidden peer">
              <span class="block text-center py-2.5 rounded-lg border border-gray-200 text-sm peer-checked:bg-indigo-600 peer-checked:text-white peer-checked:border-indigo-600 cursor-pointer">Parcial</span></label>
          </div>
        </div>
        <div>
          <label class="text-sm text-gray-600">Comentario</label>
          <textarea id="fComentario" rows="3" class="w-full mt-1 px-3 py-2.5 border border-gray-200 rounded-lg text-sm focus:ring-2 focus:ring-indigo-500 focus:outline-none"></textarea>
        </div>
        <p id="gpsStatus" class="text-xs text-gray-400">Obteniendo ubicación…</p>
        <button type="submit" id="btnSave" class="w-full bg-indigo-600 text-white rounded-lg py-3 text-sm font-medium hover:bg-indigo-700 transition">Guardar</button>
      </form>

      <button id="btnVerLista" class="w-full mt-4 text-sm text-indigo-600 font-medium py-2">Ver registros del día →</button>
    </section>
  </main>`;

  document.getElementById('btnLogout').onclick = logout;
  document.getElementById('btnVerLista').onclick = renderMobileList;
  exclusividad('fTicket', 'fTraspaso');
  soloNumeros('fTicket'); soloNumeros('fTraspaso');
  document.querySelectorAll('[data-scan]').forEach(btn => btn.onclick = ()=> abrirEscaner(btn.dataset.scan));

  let coords = null;
  const gpsEl = document.getElementById('gpsStatus');
  if (navigator.geolocation){
    if (!window.isSecureContext){
      gpsEl.textContent = 'La ubicación requiere HTTPS (iOS la bloquea en http). Se guardará sin GPS.';
      gpsEl.className = 'text-xs text-amber-600';
    } else {
      navigator.geolocation.getCurrentPosition(
        pos => { coords = { lat: pos.coords.latitude, lng: pos.coords.longitude }; gpsEl.textContent = 'Ubicación capturada ✓'; gpsEl.className='text-xs text-emerald-600'; },
        (err) => {
          const msg = err.code === 1
            ? 'Permiso de ubicación denegado. Activa Ubicación para este navegador en Ajustes.'
            : 'No se pudo obtener ubicación (se guardará sin GPS).';
          gpsEl.textContent = msg; gpsEl.className = 'text-xs text-amber-600';
        },
        { enableHighAccuracy:true, timeout:8000, maximumAge:0 }
      );
    }
  } else {
    gpsEl.textContent = 'Este navegador no soporta geolocalización.';
    gpsEl.className = 'text-xs text-amber-600';
  }

  document.getElementById('entryForm').addEventListener('submit', async (e)=>{
    e.preventDefault();
    const btn = document.getElementById('btnSave');
    btn.disabled = true; btn.textContent = 'Guardando…';

    const ticket = document.getElementById('fTicket').value.trim();
    const traspaso = document.getElementById('fTraspaso').value.trim();
    const status = document.querySelector('input[name=status]:checked').value;
    const comentario = document.getElementById('fComentario').value.trim();

    const prev = await buscarPrevio(ticket, traspaso);
    if (prev){
      const continuar = await confirmarDuplicado(prev);
      if (!continuar){ btn.disabled = false; btn.textContent = 'Guardar'; return; }
    }

    const { error } = await sb.from('registros').insert({
      ticket, traspaso, status, comentario,
      sucursal_id: perfil.sucursal_id,
      usuario_id: perfil.id,
      lat: coords?.lat ?? null,
      lng: coords?.lng ?? null
    });

    btn.disabled = false; btn.textContent = 'Guardar';
    if (error){ toast('Error al guardar: ' + error.message, false); return; }
    toast('Registro guardado');
    e.target.reset();
  });
}

async function renderMobileList(){
  app.innerHTML = `
  <main class="min-h-screen bg-gray-50">
    <header class="bg-white border-b border-gray-200 px-4 py-3 flex items-center gap-3 sticky top-0 z-10" style="padding-top: max(0.75rem, env(safe-area-inset-top))">
      <button id="btnBack" class="text-gray-500">←</button>
      <p class="font-semibold text-sm">Registros recientes</p>
    </header>
    <section id="listWrap" class="p-4 space-y-2 max-w-md mx-auto"><p class="text-sm text-gray-400">Cargando…</p></section>
  </main>`;
  document.getElementById('btnBack').onclick = renderMobileEntry;

  const { data, error } = await sb.from('registros')
    .select('*').eq('sucursal_id', perfil.sucursal_id)
    .order('created_at', { ascending:false }).limit(30);

  const wrap = document.getElementById('listWrap');
  if (error){ wrap.innerHTML = `<p class="text-sm text-red-600">${error.message}</p>`; return; }
  if (!data.length){ wrap.innerHTML = `<p class="text-sm text-gray-400">Sin registros aún.</p>`; return; }

  wrap.innerHTML = data.map(r => `
    <div class="rounded-xl border p-3 ${r.es_duplicado ? (r.status==='Parcial' ? 'border-amber-300 bg-amber-50' : 'dup-row border-red-300') : 'bg-white border-gray-200'}">
      <div class="flex justify-between text-sm font-medium">
        <span>Picking ${r.ticket} · Traspaso ${r.traspaso}</span>
        <span class="px-2 py-0.5 rounded-full text-xs ${r.status==='Total'?'bg-emerald-100 text-emerald-700':'bg-amber-100 text-amber-700'}">${r.status}</span>
      </div>
      ${r.comentario ? `<p class="text-xs text-gray-500 mt-1">${r.comentario}</p>` : ''}
      ${r.es_duplicado ? (r.status==='Parcial'
          ? `<p class="text-xs text-amber-600 font-medium mt-1">⚠ Entrega en parcialidades</p>`
          : `<p class="text-xs text-red-600 font-medium mt-1">⚠ Posible duplicado</p>`) : ''}
      <p class="text-xs text-gray-400 mt-1">${new Date(r.created_at).toLocaleString()}</p>

let chartSucursalInst = null, chartActividadInst = null;

async function renderKpis(main){
  main.innerHTML = `<p class="text-sm text-gray-400">Cargando KPIs…</p>`;
  const isAdmin = perfil.rol === 'Admin';
  let query = sb.from('registros').select('*');
  if (!isAdmin) query = query.eq('sucursal_id', perfil.sucursal_id);
  const { data, error } = await query;
  if (error){ main.innerHTML = `<p class="text-red-600 text-sm">${error.message}</p>`; return; }

  const hoy = new Date().toDateString();
  const hoyRegs = data.filter(r => new Date(r.created_at).toDateString() === hoy);
  const dup = data.filter(r => r.es_duplicado).length;

  const porSucursal = {};
  data.forEach(r => porSucursal[r.sucursal_id] = (porSucursal[r.sucursal_id]||0)+1);

  // Actividad: registros por hora del día actual (0-23h)
  const porHora = Array(24).fill(0);
  hoyRegs.forEach(r => { porHora[new Date(r.created_at).getHours()]++; });

  main.innerHTML = `
    <div class="h-[calc(100vh-3rem)] flex flex-col overflow-hidden">
      <h1 class="font-semibold text-base mb-2 text-gray-700">Resumen del día</h1>
      <div class="grid grid-cols-4 gap-2 mb-3">
        ${kpiCard('Registros hoy', hoyRegs.length, 'plus', 'from-indigo-500 to-violet-600')}
        ${kpiCard('Total histórico', data.length, 'list', 'from-sky-500 to-cyan-500')}
        ${kpiCard('Duplicados', dup, 'chart', 'from-rose-500 to-orange-500')}
        ${kpiCard('Sucursales', sucursales.length, 'home', 'from-emerald-500 to-teal-500')}
      </div>
      <div class="grid grid-cols-2 gap-3 flex-1 min-h-0">
        <div class="liquid-card rounded-2xl p-3 flex flex-col min-h-0">
          <div class="flex items-center justify-between mb-1">
            <h2 class="text-sm font-medium text-gray-700">Registros por sucursal</h2>
            <select id="tipoSucursal" class="text-xs border border-gray-200 rounded-lg px-2 py-1 bg-white/70">
              <option value="bar">Barras</option><option value="line">Línea</option>
              <option value="radar">Radar</option><option value="doughnut">Dona</option><option value="pie">Pastel</option>
            </select>
          </div>
          <div class="flex-1 min-h-0 relative"><canvas id="chartSucursal"></canvas></div>
        </div>
        <div class="liquid-card rounded-2xl p-3 flex flex-col min-h-0">
          <div class="flex items-center justify-between mb-1">
            <h2 class="text-sm font-medium text-gray-700">Actividad (hoy, por hora)</h2>
            <select id="tipoActividad" class="text-xs border border-gray-200 rounded-lg px-2 py-1 bg-white/70">
              <option value="line">Línea</option><option value="bar">Barras</option>
              <option value="radar">Radar</option><option value="pie">Pastel</option>
            </select>
          </div>
          <div class="flex-1 min-h-0 relative"><canvas id="chartActividad"></canvas></div>
        </div>
      </div>
    </div>`;

  const sucLabels = Object.keys(porSucursal).map(id => sucursales.find(s=>s.id===id)?.nombre || id);
  const sucValues = Object.values(porSucursal);
  const horaLabels = Array.from({length:24}, (_,h)=> `${h}:00`);

  function dibujarSucursal(tipo){
    if (chartSucursalInst) chartSucursalInst.destroy();
    const esCircular = tipo==='doughnut' || tipo==='pie';
    chartSucursalInst = new Chart(document.getElementById('chartSucursal'), {
      type: tipo,
      data: { labels: sucLabels, datasets:[{
        label:'Registros', data: sucValues,
        backgroundColor: esCircular ? ['#6366f1','#06b6d4','#f43f5e','#10b981','#f59e0b','#8b5cf6'] : 'rgba(99,102,241,0.75)',
        borderColor:'#6366f1', borderRadius: tipo==='bar' ? 8 : 0, tension:0.35, fill: tipo==='line'
      }]},
      options:{ maintainAspectRatio:false, plugins:{ legend:{ display: esCircular } },
        scales: esCircular ? {} : { y:{ beginAtZero:true, ticks:{precision:0} } } }
    });
  }
  function dibujarActividad(tipo){
    if (chartActividadInst) chartActividadInst.destroy();
    const esCircular = tipo==='pie';
    chartActividadInst = new Chart(document.getElementById('chartActividad'), {
      type: tipo,
      data: { labels: horaLabels, datasets:[{
        label:'Registros', data: porHora,
        backgroundColor: esCircular ? horaLabels.map((_,i)=>`hsl(${i*15},70%,60%)`) : 'rgba(16,185,129,0.25)',
        borderColor:'#10b981', borderWidth:2, tension:0.4, fill: tipo==='line', pointRadius: tipo==='line' ? 2 : 0
      }]},
      options:{ maintainAspectRatio:false, plugins:{ legend:{ display: esCircular } },
        scales: esCircular ? {} : { y:{ beginAtZero:true, ticks:{precision:0} } } }
    });
  }
  dibujarSucursal('bar');
  dibujarActividad('line');
  document.getElementById('tipoSucursal').addEventListener('change', e=> dibujarSucursal(e.target.value));
  document.getElementById('tipoActividad').addEventListener('change', e=> dibujarActividad(e.target.value));
}

    <div class="liquid-blob"></div>
    <div class="flex items-center justify-between relative z-10">
      <p class="text-[11px] text-white/85 leading-tight">${label}</p>
      <span class="text-white/90">${icon(iconName,'w-3 h-3')}</span>
    </div>

}

  main.innerHTML = `

      ${isAdmin ? `<div><label class="text-xs text-gray-500">Sucursal</label>
        <select id="fSucursal" class="block px-3 py-2 border border-gray-200 rounded-lg text-sm"><option value="">Todas</option>${opcionesSuc}</select></div>` : ''}
      <div><label class="text-xs text-gray-500">Status</label>

      <div><label class="text-xs text-gray-500">Solo duplicados</label>
        <select id="fDup" class="block px-3 py-2 border border-gray-200 rounded-lg text-sm"><option value="">Todos</option><option value="si">Sí</option><option value="no">No</option></select></div>
      <button id="btnLimpiar" class="px-3 py-2 text-sm text-gray-500 border border-gray-200 rounded-lg">Limpiar</button>
    </div>
    <div class="bg-white border border-gray-200 rounded-2xl overflow-hidden">
      <table class="w-full text-sm">
        <thead class="bg-gray-50 text-gray-500 text-left">
          <tr><th class="px-4 py-2">Picking</th><th class="px-4 py-2">Traspaso</th><th class="px-4 py-2">Status</th>
          <th class="px-4 py-2">Sucursal</th><th class="px-4 py-2">Comentario</th><th class="px-4 py-2">Fecha</th>${isAdmin ? '<th class="px-4 py-2"></th>' : ''}</tr>
        </thead>
        <tbody id="tbody"><tr><td colspan="6" class="px-4 py-4 text-gray-400">Cargando…</td></tr></tbody>
      </table>
    </div>`;

  let query = sb.from('registros').select('*, sucursales(nombre)').order('created_at',{ascending:false}).limit(500);
  if (!isAdmin) query = query.eq('sucursal_id', perfil.sucursal_id);
  const { data, error } = await query;
  const tbody = document.getElementById('tbody');
  if (error){ tbody.innerHTML = `<tr><td colspan="6" class="px-4 py-4 text-red-600">${error.message}</td></tr>`; return; }

  function draw(rows){
    tbody.innerHTML = rows.map(r => `
      <tr class="border-t border-gray-100 ${r.es_duplicado ? (r.status==='Parcial' ? 'bg-amber-50' : 'dup-row') : ''}">
        <td class="px-4 py-2 font-medium">${r.ticket}</td>
        <td class="px-4 py-2">${r.traspaso}</td>
        <td class="px-4 py-2"><span class="px-2 py-0.5 rounded-full text-xs ${r.status==='Total'?'bg-emerald-100 text-emerald-700':'bg-amber-100 text-amber-700'}">${r.status}</span></td>
        <td class="px-4 py-2">${r.sucursales?.nombre||''}</td>
        <td class="px-4 py-2 text-gray-500">${r.comentario||''}${r.es_duplicado ? (r.status==='Parcial' ? '<br><span class="text-amber-600 font-medium">⚠ Entrega en parcialidades</span>' : '<br><span class="text-red-600 font-medium">⚠ Duplicado</span>') : ''}</td>
        <td class="px-4 py-2 text-gray-400">${new Date(r.created_at).toLocaleString()}</td>
        ${isAdmin ? `<td class="px-4 py-2"><button data-del="${r.id}" class="text-red-500 hover:text-red-700 text-xs">Eliminar</button></td>` : ''}
      </tr>`).join('') || `<tr><td colspan="7" class="px-4 py-4 text-gray-400">Sin resultados.</td></tr>`;
    if (isAdmin){
      tbody.querySelectorAll('[data-del]').forEach(btn => btn.onclick = async ()=>{
        if (!confirm('¿Eliminar este registro? Esta acción no se puede deshacer.')) return;
        const { error } = await sb.from('registros').delete().eq('id', btn.dataset.del);
        if (error){ toast(error.message, false); return; }
        toast('Registro eliminado');
        renderRegistrosTable(main);
      });
    }
  }

  function aplicarFiltros(){
    const q = document.getElementById('search').value.toLowerCase();
    const desde = document.getElementById('fDesde').value;
    const hasta = document.getElementById('fHasta').value;
    const sucSel = isAdmin ? document.getElementById('fSucursal').value : '';
    const statusSel = document.getElementById('fStatus').value;
    const dupSel = document.getElementById('fDup').value;

    let rows = data;
    if (q) rows = rows.filter(r => r.ticket.toLowerCase().includes(q) || r.traspaso.toLowerCase().includes(q));
    if (desde) rows = rows.filter(r => new Date(r.created_at) >= new Date(desde));
    if (hasta) rows = rows.filter(r => new Date(r.created_at) <= new Date(hasta + 'T23:59:59'));
    if (sucSel) rows = rows.filter(r => r.sucursal_id === sucSel);
    if (statusSel) rows = rows.filter(r => r.status === statusSel);
    if (dupSel) rows = rows.filter(r => dupSel === 'si' ? r.es_duplicado : !r.es_duplicado);
    draw(rows);
  }

  draw(data);
  ['search','fDesde','fHasta','fStatus','fDup'].forEach(id => document.getElementById(id).addEventListener('input', aplicarFiltros));
  if (isAdmin) document.getElementById('fSucursal').addEventListener('input', aplicarFiltros);
  document.getElementById('btnLimpiar').onclick = ()=>{
    document.getElementById('search').value=''; document.getElementById('fDesde').value=''; document.getElementById('fHasta').value='';
    document.getElementById('fStatus').value=''; document.getElementById('fDup').value='';
    if (isAdmin) document.getElementById('fSucursal').value='';
    draw(data);
  };
}

    });
    if (err2){ toast(err2.message, false); return; }
    toast('Usuario creado'); dlg.close(); cargarTablaUsuarios();
  });

  cargarTablaUsuarios();
}

function dialogoEditarUsuario(u){
  const opciones = sucursales.map(s=>`<option value="${s.id}" ${s.id===u.sucursal_id?'selected':''}>${s.nombre}</option>`).join('');
  const dlg = document.createElement('dialog');
  dlg.className = 'rounded-2xl p-0 w-full max-w-sm backdrop:bg-black/30';
  dlg.innerHTML = `
    <form class="p-5 space-y-3">
      <h2 class="font-semibold text-base mb-2">Editar usuario</h2>
      <div><label class="text-sm text-gray-600">Nombre completo</label>
        <input id="eNombre" value="${u.nombre_completo}" required class="w-full mt-1 px-3 py-2 border border-gray-200 rounded-lg text-sm"></div>
      <div><label class="text-sm text-gray-600">Usuario (para iniciar sesión)</label>
        <input id="eUsername" value="${u.username || ''}" placeholder="ej. alberto" class="w-full mt-1 px-3 py-2 border border-gray-200 rounded-lg text-sm"></div>
      <div><label class="text-sm text-gray-600">Rol</label>
        <select id="eRol" class="w-full mt-1 px-3 py-2 border border-gray-200 rounded-lg text-sm">
          <option value="2" ${u.rol_id===2?'selected':''}>Registro</option>
          <option value="1" ${u.rol_id===1?'selected':''}>Admin</option>
          <option value="3" ${u.rol_id===3?'selected':''}>Auditor</option>
        </select></div>
      <div><label class="text-sm text-gray-600">Sucursal</label>
        <select id="eSucursal" class="w-full mt-1 px-3 py-2 border border-gray-200 rounded-lg text-sm">${opciones}</select></div>
      <div><label class="text-sm text-gray-600">Estado</label>
        <select id="eActivo" class="w-full mt-1 px-3 py-2 border border-gray-200 rounded-lg text-sm">
          <option value="true" ${u.activo?'selected':''}>Activo</option>
          <option value="false" ${!u.activo?'selected':''}>Inactivo</option>
        </select></div>
      <div class="pt-1 border-t border-gray-100">
        <label class="text-sm text-gray-600">Restablecer contraseña (opcional)</label>
        <input id="eNuevaPass" type="password" placeholder="Dejar en blanco para no cambiar" class="w-full mt-1 px-3 py-2 border border-gray-200 rounded-lg text-sm">
        <p class="text-xs text-gray-400 mt-1">Requiere la Edge Function de administración (ver nota más abajo).</p>
      </div>
      <div class="flex gap-2 pt-2">
        <button type="button" id="eCancelar" class="flex-1 border border-gray-200 rounded-lg py-2 text-sm">Cancelar</button>
        <button class="flex-1 bg-indigo-600 text-white rounded-lg py-2 text-sm">Guardar</button>
      </div>
    </form>`;
  document.body.appendChild(dlg);
  dlg.showModal();
  dlg.querySelector('#eCancelar').onclick = ()=>{ dlg.close(); dlg.remove(); };

  dlg.querySelector('form').addEventListener('submit', async e=>{
    e.preventDefault();
    const { error } = await sb.from('usuarios').update({
      nombre_completo: dlg.querySelector('#eNombre').value.trim(),
      username: dlg.querySelector('#eUsername').value.trim().toLowerCase() || null,
      rol_id: Number(dlg.querySelector('#eRol').value),
      sucursal_id: dlg.querySelector('#eSucursal').value,
      activo: dlg.querySelector('#eActivo').value === 'true'
    }).eq('id', u.id);
    if (error){ toast(error.message, false); return; }

    const nuevaPass = dlg.querySelector('#eNuevaPass').value.trim();
    if (nuevaPass){
      const { error: errPass } = await sb.functions.invoke('admin-reset-password', {
        body: { user_id: u.id, new_password: nuevaPass }
      });
      if (errPass){ toast('Perfil actualizado, pero la contraseña no se pudo cambiar: ' + errPass.message, false); }
      else toast('Usuario y contraseña actualizados');
    } else {
      toast('Usuario actualizado');
    }
    dlg.close(); dlg.remove();
    cargarTablaUsuarios();
  });
}
async function cargarTablaUsuarios(){
  const { data, error } = await sb.from('usuarios').select('*, roles(nombre), sucursales(nombre)');
  const tbody = document.getElementById('tbodyUsr');
  if (error){ tbody.innerHTML = `<tr><td colspan="7" class="px-4 py-4 text-red-600">${error.message}</td></tr>`; return; }
  tbody.innerHTML = data.map(u => `
    <tr class="border-t border-gray-100">
      <td class="px-4 py-2">${u.nombre_completo}</td>
      <td class="px-4 py-2 text-gray-500">${u.username || '—'}</td>
      <td class="px-4 py-2">${u.roles?.nombre}</td>
      <td class="px-4 py-2">${u.sucursales?.nombre||'—'}</td>
      <td class="px-4 py-2">${u.activo ? '<span class="text-emerald-600">Activo</span>' : '<span class="text-gray-400">Inactivo</span>'}</td>
      <td class="px-4 py-2"><button data-edit="${u.id}" class="text-indigo-600 text-xs hover:underline">Editar</button></td>
      <td class="px-4 py-2">${u.id === perfil.id ? '' : `<button data-del="${u.id}" class="text-red-500 text-xs hover:underline">Eliminar</button>`}</td>
    </tr>`).join('');
  tbody.querySelectorAll('[data-edit]').forEach(btn => btn.onclick = ()=>{
    const u = data.find(x => x.id === btn.dataset.edit);
    dialogoEditarUsuario(u);
  });
  tbody.querySelectorAll('[data-del]').forEach(btn => btn.onclick = async ()=>{
    if (!confirm('¿Eliminar este usuario de forma permanente? Esta acción no se puede deshacer.')) return;
    const { data: res, error: errDel } = await sb.functions.invoke('admin-delete-user', {
      body: { user_id: btn.dataset.del }
    });
    if (errDel || res?.error){ toast((res?.error) || errDel.message, false); return; }
    toast('Usuario eliminado');
    cargarTablaUsuarios();
  });
}

/* ============================================================
   AUDITORÍA — solo Admin y Auditor; valida duplicados
============================================================ */
async function renderAuditoria(main){
  main.innerHTML = `
    <div class="flex items-center justify-between mb-4">
      <h1 class="font-semibold text-lg">Auditoría de duplicados</h1>
      <select id="fEstatusAud" class="px-3 py-2 border border-gray-200 rounded-lg text-sm">
        <option value="Pendiente">Pendientes</option>
        <option value="Aprobado">Aprobados</option>
        <option value="">Todos</option>
      </select>
    </div>
    <div id="audWrap" class="space-y-2"><p class="text-sm text-gray-400">Cargando…</p></div>`;

  async function cargar(){
    const estatus = document.getElementById('fEstatusAud').value;
    let query = sb.from('registros').select('*, sucursales(nombre)').eq('es_duplicado', true).order('created_at',{ascending:false});
    if (estatus) query = query.eq('auditoria_status', estatus);
    const { data, error } = await query;
    const wrap = document.getElementById('audWrap');
    if (error){ wrap.innerHTML = `<p class="text-red-600 text-sm">${error.message}</p>`; return; }
    if (!data.length){ wrap.innerHTML = `<p class="text-sm text-gray-400">Sin registros en esta vista.</p>`; return; }

    wrap.innerHTML = data.map(r => `
      <div class="bg-white border rounded-xl p-4 flex items-center justify-between ${r.status==='Parcial'?'border-amber-300':'border-red-300'}">
        <div>
          <p class="text-sm font-medium">Picking ${r.ticket} · Traspaso ${r.traspaso}
            <span class="ml-2 px-2 py-0.5 rounded-full text-xs ${r.status==='Total'?'bg-emerald-100 text-emerald-700':'bg-amber-100 text-amber-700'}">${r.status}</span>
          </p>
          <p class="text-xs text-gray-500 mt-1">${r.sucursales?.nombre||''} · ${new Date(r.created_at).toLocaleString()}</p>
          ${r.comentario ? `<p class="text-xs text-gray-500 mt-1">${r.comentario}</p>` : ''}
          <p class="text-xs mt-1 font-medium ${r.auditoria_status==='Aprobado' ? 'text-emerald-600' : 'text-red-600'}">
            ${r.auditoria_status==='Aprobado' ? '✓ Aprobado por auditoría' : '⚠ Pendiente de revisión'}</p>
        </div>
        ${r.auditoria_status !== 'Aprobado'
          ? `<button data-aprobar="${r.id}" class="bg-emerald-600 text-white text-sm px-3 py-2 rounded-lg hover:bg-emerald-700">Aprobar</button>`
          : ''}
      </div>`).join('');

    wrap.querySelectorAll('[data-aprobar]').forEach(btn => btn.onclick = async ()=>{
      const { error } = await sb.from('registros').update({
        auditoria_status: 'Aprobado', auditado_por: perfil.id, auditado_en: new Date().toISOString()
      }).eq('id', btn.dataset.aprobar);
      if (error){ toast(error.message, false); return; }
      toast('Registro aprobado por auditoría');
      cargar();
    });
  }
  document.getElementById('fEstatusAud').addEventListener('change', cargar);
  cargar();
}

/* ============================================================
   CONFIGURACIÓN (solo Admin) — carga inicial desde Excel/CSV
============================================================ */
let importBuffer = []; // filas crudas leídas del archivo
let importHeaders = [];

function renderConfig(main){
  main.innerHTML = `
    <h1 class="font-semibold text-lg mb-1">Configuración</h1>
    <p class="text-sm text-gray-500 mb-4">Carga inicial de base de datos desde un sistema externo (Excel o CSV).</p>

    <div class="bg-white border border-gray-200 rounded-2xl p-5 max-w-2xl space-y-4">
      <div>
        <label class="text-sm text-gray-600">Archivo (.xlsx, .xls o .csv)</label>
        <input id="fileImport" type="file" accept=".xlsx,.xls,.csv" class="block w-full mt-1 text-sm">
      </div>
      <div id="mapeoWrap" class="hidden space-y-3">
        <p class="text-sm text-gray-600">Relaciona cada columna de tu archivo con el campo correspondiente:</p>
        <div id="mapeoCampos" class="grid grid-cols-2 gap-3 text-sm"></div>
        <div>
          <label class="text-sm text-gray-600">Sucursal por defecto (si el archivo no trae columna de sucursal)</label>
          <select id="mapSucursalDefault" class="w-full mt-1 px-3 py-2 border border-gray-200 rounded-lg text-sm">
            ${sucursales.map(s=>`<option value="${s.id}">${s.nombre}</option>`).join('')}
          </select>
        </div>
        <p id="previewCount" class="text-xs text-gray-400"></p>
        <button id="btnImportar" class="bg-indigo-600 text-white text-sm px-4 py-2 rounded-lg hover:bg-indigo-700">Importar registros</button>
        <p id="importStatus" class="text-sm"></p>
      </div>
    </div>`;

  document.getElementById('fileImport').addEventListener('change', async (e)=>{
    const file = e.target.files[0];
    if (!file) return;
    const data = await file.arrayBuffer();
    const wb = XLSX.read(data, { type:'array' });
    const sheet = wb.Sheets[wb.SheetNames[0]];
    const rows = XLSX.utils.sheet_to_json(sheet, { defval:'' });
    if (!rows.length){ toast('El archivo no tiene datos', false); return; }
    importBuffer = rows;
    importHeaders = Object.keys(rows[0]);
    mostrarMapeo();
  });

  function mostrarMapeo(){
    const campos = [
      { key:'ticket', label:'Picking (Ticket)', required:true },
      { key:'traspaso', label:'Traspaso', required:true },
      { key:'status', label:'Status (Total/Parcial)', required:false },
      { key:'comentario', label:'Comentario', required:false },
      { key:'sucursal', label:'Sucursal (nombre)', required:false },
      { key:'fecha', label:'Fecha del registro', required:false },
    ];
    const opcionesCols = importHeaders.map(h=>`<option value="${h}">${h}</option>`).join('');
    document.getElementById('mapeoCampos').innerHTML = campos.map(c => `
      <div>
        <label class="text-xs text-gray-500">${c.label}${c.required?' *':''}</label>
        <select data-map="${c.key}" class="w-full mt-1 px-2 py-1.5 border border-gray-200 rounded-lg text-sm">
          <option value="">— No aplica —</option>${opcionesCols}
        </select>
      </div>`).join('');
    document.getElementById('mapeoWrap').classList.remove('hidden');
    document.getElementById('previewCount').textContent = `${importBuffer.length} filas detectadas en el archivo.`;
  }

  document.getElementById('btnImportar')?.addEventListener('click', importarAhora);
  main.querySelector('#mapeoWrap').addEventListener('click', e=>{
    if (e.target.id === 'btnImportar') importarAhora();
  });

  async function importarAhora(){
    const mapeos = {};
    main.querySelectorAll('[data-map]').forEach(sel => mapeos[sel.dataset.map] = sel.value);
    if (!mapeos.ticket || !mapeos.traspaso){
      toast('Debes mapear al menos Picking y Traspaso', false); return;
    }
    const statusEl = document.getElementById('importStatus');
    statusEl.textContent = 'Importando…'; statusEl.className = 'text-sm text-gray-500';

    const sucursalDefault = document.getElementById('mapSucursalDefault').value;
    const registrosNuevos = [];
    for (const row of importBuffer){
      const ticket = String(row[mapeos.ticket] ?? '').trim();
      const traspaso = String(row[mapeos.traspaso] ?? '').trim();
      if (!ticket && !traspaso) continue;

      let status = mapeos.status ? String(row[mapeos.status] ?? '').trim() : '';
      status = /parc/i.test(status) ? 'Parcial' : 'Total';

      let sucursal_id = sucursalDefault;
      if (mapeos.sucursal){
        const nombreSuc = String(row[mapeos.sucursal] ?? '').trim();
        let suc = sucursales.find(s => s.nombre.toLowerCase() === nombreSuc.toLowerCase());
        if (!suc && nombreSuc){
          const { data: nueva } = await sb.from('sucursales').insert({ nombre: nombreSuc }).select().single();
          if (nueva){ sucursales.push(nueva); suc = nueva; }
        }
        if (suc) sucursal_id = suc.id;
      }

      let created_at = undefined;
      if (mapeos.fecha && row[mapeos.fecha]){
        const f = new Date(row[mapeos.fecha]);
        if (!isNaN(f)) created_at = f.toISOString();
      }

      registrosNuevos.push({
        ticket, traspaso, status,
        comentario: mapeos.comentario ? String(row[mapeos.comentario] ?? '').trim() : '',
        sucursal_id, usuario_id: perfil.id,
        ...(created_at ? { created_at } : {})
      });
    }

    let insertados = 0, errores = 0;
    for (let i=0; i<registrosNuevos.length; i+=200){
      const bloque = registrosNuevos.slice(i, i+200);
      const { error } = await sb.from('registros').insert(bloque);
      if (error){ errores += bloque.length; } else { insertados += bloque.length; }
    }
    statusEl.textContent = `Importación terminada: ${insertados} registros guardados${errores?`, ${errores} con error`:''}.`;
    statusEl.className = errores ? 'text-sm text-amber-600' : 'text-sm text-emerald-600';
    toast(`Importación completa (${insertados} registros)`);
  }
}
